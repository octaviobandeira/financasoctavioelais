name: Publicar

# Publica o site no Firebase Hosting a cada push na branch principal.
#
# Requer apenas UM secret no GitHub:
#   FIREBASE_TOKEN  → gerado localmente com `firebase login:ci`
#   (a política da organização bloqueia chaves de conta de serviço,
#   então usamos um token de CI vinculado à conta do Firebase)

on:
  push:
    branches: [main]
  workflow_dispatch: # botão "Run workflow" na aba Actions

permissions:
  contents: read

concurrency:
  group: publicar
  cancel-in-progress: true

jobs:
  publicar:
    name: Publicar no Firebase Hosting
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Publicar
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project financas-casal-9663e --token "$FIREBASE_TOKEN"

      - name: Endereço do sistema
        run: |
          echo "### Sistema publicado :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "https://financeiro-octavio-lais.web.app" >> $GITHUB_STEP_SUMMARY
